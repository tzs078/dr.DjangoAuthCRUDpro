<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .container{
            width:350px;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .container h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#4facfe;
        }

        .btn{
            width:100%;
            padding:10px;
            border:none;
            background:#4facfe;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#3498db;
        }

        .extra{
            text-align:center;
            margin-top:15px;
        }

        .extra a{
            text-decoration:none;
            color:#4facfe;
        }

        .extra a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Log In</h2>
         {% include 'master/messages.html' %}
        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>username</label>
                <input type="text" name="firstname" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="passwordf" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="extra">
                <p>Don't have an account? <a href="{% url 'signupPage' %}">Sign Up</a></p>
            </div>
        </form>
    </div>

</body>
</html>
