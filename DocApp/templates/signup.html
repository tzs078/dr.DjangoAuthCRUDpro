<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            background:linear-gradient(135deg, #667eea, #764ba2);
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .input-group{
            margin-bottom:15px;
        }

        .input-group label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            outline:none;
        }

        .input-group input:focus{
            border-color:#667eea;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:6px;
            background:#667eea;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            background:#5563d6;
        }

        .extra{
            text-align:center;
            margin-top:15px;
        }

        .extra a{
            text-decoration:none;
            color:#667eea;
        }

        .extra a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Create Account</h2>

        {% include 'master/messages.html' %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="firstname" placeholder="Enter username">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="emailf" placeholder="Enter email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" name="passwordf" placeholder="Enter password">
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" name="passwordf2" placeholder="Confirm password">
            </div>

            <button type="submit" class="btn">Sign Up</button>

            <div class="extra">
                <p>Already have an account? <a href="{% url 'loginPage' %}">Sign In</a></p>
            </div>
        </form>
    </div>

</body>
</html>
